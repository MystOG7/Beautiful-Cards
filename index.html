<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starry Night Journal - Something That Brings Smile On Someone's Face</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Dancing+Script:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; 
        }

        html, body {
            background-color: #0a0e27; 
            width: 100%;
            height: 100%;
        }

        body {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f4b 30%, #0d1128 60%, #1a0a2e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Playfair Display', serif;
            overflow: hidden;
            perspective: 2000px;
            touch-action: none; 
        }

        /* Animated stars background */
        .stars-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            opacity: 0;
            will-change: opacity, transform; 
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: var(--opacity); transform: scale(1); }
        }

        /* Moon */
        .moon {
            position: fixed;
            top: 40px;
            right: 60px;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle at 30% 30%, #fff9e6, #f0e6d3);
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(255, 249, 230, 0.3);
            z-index: 1;
        }

        /* Book Container */
        .book-container {
            position: relative;
            z-index: 10;
            width: 500px;
            height: 700px;
            perspective: 2000px;
        }

        .book {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
            will-change: transform;
        }

        /* Cover */
        .cover, .back-cover {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #1a1f4b 0%, #0d1128 40%, #1a0a2e 70%, #0a0e27 100%);
            border-radius: 8px 20px 20px 8px;
            box-shadow: 
                inset 0 0 40px rgba(0, 0, 0, 0.5),
                10px 10px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border: 3px solid rgba(200, 180, 140, 0.3);
            will-change: transform;
        }

        .cover { z-index: 100; transform-origin: left center; }

        .back-cover {
            transform: rotateY(180deg);
            z-index: 0;
        }

        .cover-decoration {
            position: absolute;
            top: 30px; left: 30px; right: 30px; bottom: 30px;
            border: 2px solid rgba(200, 180, 140, 0.4);
            border-radius: 4px;
            pointer-events: none;
        }

        .cover-title {
            font-family: 'Cinzel', serif;
            font-size: 2.2rem;
            color: #e8dcc8;
            text-align: center;
            line-height: 1.4;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            z-index: 10;
            padding: 0 40px;
            letter-spacing: 1px;
        }

        .cover-subtitle {
            font-family: 'Dancing Script', cursive;
            font-size: 1.4rem;
            color: #c9b896;
            margin-top: 20px;
            z-index: 10;
        }

        .open-btn {
            margin-top: 40px;
            padding: 12px 40px;
            background: rgba(200, 180, 140, 0.1);
            border: 2px solid rgba(200, 180, 140, 0.6);
            color: #e8dcc8;
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            letter-spacing: 3px;
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.3s ease;
            z-index: 10;
        }

        /* Pages */
        .pages-container {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
        }

        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0; left: 0;
            transform-origin: left center;
            transform-style: preserve-3d;
            transition: transform 0.9s cubic-bezier(0.645, 0.045, 0.355, 1);
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            will-change: transform;
        }

        .page-front, .page-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 0 12px 12px 0;
            overflow: hidden;
        }

        .page-front {
            background: #faf8f3;
            z-index: 2;
        }

        .page-back {
            background: #f5f0e8;
            transform: rotateY(180deg);
            z-index: 1;
        }

        /* Card on each page - CENTERED */
        .card-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .card {
            width: 100%;
            height: 100%;
            max-width: 420px;
            max-height: 580px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background: rgba(0,0,0,0.03);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: pointer;
        }

        @media (hover: hover) and (pointer: fine) {
            .card:hover {
                transform: rotateY(5deg) rotateX(-3deg) translateZ(10px);
                box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            }
        }

        .card-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 8px;
            display: block;
            transition: transform 0.3s ease;
        }

        /* ===== FULLSCREEN LIGHTBOX ===== */
        .lightbox {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(5, 5, 15, 0.95);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .lightbox.active {
            opacity: 1;
            pointer-events: all;
        }

        .lightbox-img-wrapper {
            width: 90vw;
            height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            touch-action: none;
        }

        .lightbox-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.3s ease;
            transform-origin: center center;
            cursor: grab;
            user-select: none;
            -webkit-user-drag: none;
        }

        .lightbox-img.grabbing {
            cursor: grabbing;
        }

        .lightbox-img.zoomed {
            max-width: none;
            max-height: none;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 25px;
            width: 45px;
            height: 45px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
            color: #e8dcc8;
            font-size: 1.5rem;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10001;
            transition: background 0.2s;
        }

        .lightbox-close:hover {
            background: rgba(255,255,255,0.2);
        }

        .lightbox-controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 10001;
        }

        .lightbox-btn {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
            color: #e8dcc8;
            font-size: 1.3rem;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .lightbox-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .lightbox-counter {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            color: #e8dcc8;
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            letter-spacing: 2px;
            z-index: 10001;
        }

        /* Navigation */
        .nav-btn {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            background: rgba(26, 31, 75, 0.9);
            border: 2px solid rgba(200, 180, 140, 0.4);
            color: #e8dcc8;
            font-size: 1.5rem;
            cursor: pointer;
            border-radius: 50%;
            z-index: 1000;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn.prev { left: 30px; }
        .nav-btn.next { right: 30px; }
        .nav-btn.hidden { opacity: 0; pointer-events: none; }

        .page.flipped { transform: rotateY(-180deg); }
        .page.flipping { z-index: 50 !important; }

        .book.open { transform: translateX(50%); }
        .book.open .cover { transform: rotateY(-160deg); }

        /* ================================== */
        /* 📱 PERFECTED MOBILE UI FIX 📱 */
        /* ================================== */
        @media (max-width: 800px) {
            .book-container {
                width: 75vw; 
                height: 65vh; 
            }
            .book.open {
                transform: translateX(50%) scale(0.5); 
            }
            .card-container {
                width: 100%;
                height: 100%;
                padding: 15px;
            }
            .card {
                max-width: 100%;
                max-height: 100%;
            }
            .cover-title {
                font-size: 1.4rem;
                padding: 0 10px;
            }
            .cover-subtitle { font-size: 1rem; }
            .open-btn { padding: 10px 20px; font-size: 0.8rem; }
            .cover-decoration { top: 15px; left: 15px; right: 15px; bottom: 15px; }

            .nav-btn { width: 40px; height: 40px; font-size: 1.2rem; }
            .nav-btn.prev { left: 5px; }
            .nav-btn.next { right: 5px; }

            .moon { top: 20px; right: 20px; width: 40px; height: 40px; }

            .lightbox-btn {
                width: 45px;
                height: 45px;
                font-size: 1.1rem;
            }
            .lightbox-close {
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
                top: 15px;
                right: 15px;
            }
        }

        /* Loading Screen */
        .loading {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0e27;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
            transition: opacity 0.6s ease;
        }
        .loading.hidden { opacity: 0; pointer-events: none; }
        .loading-text {
            font-family: 'Cinzel', serif; color: #e8dcc8; font-size: 1.2rem;
            letter-spacing: 4px; animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="loading-text">✨ Preparing Your Journal... ✨</div>
    </div>

    <div class="stars-bg" id="starsBg"></div>
    <div class="moon"></div>

    <button class="nav-btn prev hidden" id="prevBtn" onclick="prevPage()">❮</button>
    <button class="nav-btn next hidden" id="nextBtn" onclick="nextPage()">❯</button>

    <div class="book-container">
        <div class="book" id="book">
            <div class="cover" id="cover">
                <div class="cover-decoration"></div>
                <h1 class="cover-title">Something That Brings<br>Smile On Someone's Face</h1>
                <p class="cover-subtitle">A Collection of Warmth & Hope</p>
                <button class="open-btn" onclick="openBook()">OPEN JOURNAL</button>
            </div>

            <div class="pages-container" id="pagesContainer"></div>

            <div class="back-cover">
                <div class="cover-decoration"></div>
                <div style="font-size: 3rem; color:#e8dcc8;">💫</div>
            </div>
        </div>
    </div>

    <div class="lightbox" id="lightbox">
        <div class="lightbox-counter" id="lightboxCounter">1 / 15</div>
        <button class="lightbox-close" onclick="closeLightbox()">✕</button>
        <div class="lightbox-img-wrapper" id="lightboxWrapper">
            <img class="lightbox-img" id="lightboxImg" src="" alt="Fullscreen View">
        </div>
        <div class="lightbox-controls">
            <button class="lightbox-btn" onclick="zoomOut()" title="Zoom Out">−</button>
            <button class="lightbox-btn" onclick="resetZoom()" title="Reset">⟲</button>
            <button class="lightbox-btn" onclick="zoomIn()" title="Zoom In">+</button>
        </div>
    </div>

    <script>
        const images = [
            'IMG-20260620-WA0005.jpg', 'IMG-20260620-WA0006.jpg', 'IMG-20260620-WA0007.jpg',
            'IMG-20260620-WA0008.jpg', 'IMG-20260620-WA0009.jpg', 'IMG-20260620-WA0010.jpg',
            'IMG-20260620-WA0011.jpg', 'IMG-20260620-WA0012.jpg', 'IMG-20260620-WA0013.jpg',
            'IMG-20260620-WA0014.jpg', 'IMG-20260620-WA0015.jpg', 'IMG-20260620-WA0016.jpg',
            'IMG-20260620-WA0017.jpg', 'IMG-20260620-WA0018.jpg', 'IMG-20260620-WA0019.jpg'
        ];

        let currentPage = -1; 
        let isAnimating = false;
        const totalPages = images.length;
        const isMobile = window.innerWidth <= 768;

        // Lightbox state
        let zoomLevel = 1;
        let isDragging = false;
        let startX = 0, startY = 0;
        let translateX = 0, translateY = 0;
        let initialTranslateX = 0, initialTranslateY = 0;

        function generateStars() {
            const starsBg = document.getElementById('starsBg');
            const starCount = isMobile ? 30 : 80;

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 2 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
                star.style.setProperty('--opacity', Math.random() * 0.8 + 0.2);
                star.style.animationDelay = Math.random() * 5 + 's';
                starsBg.appendChild(star);
            }
        }

        function createPages() {
            const container = document.getElementById('pagesContainer');

            images.forEach((img, index) => {
                const page = document.createElement('div');
                page.className = 'page';
                page.style.zIndex = totalPages - index;

                // FRONT SIDE (right side when open) - Image
                const front = document.createElement('div');
                front.className = 'page-front';

                const frontContainer = document.createElement('div');
                frontContainer.className = 'card-container';

                const frontCard = document.createElement('div');
                frontCard.className = 'card';
                frontCard.onclick = () => openLightbox(index);

                const frontImg = document.createElement('img');
                frontImg.className = 'card-image';
                frontImg.src = img;
                frontImg.alt = 'Journal Image ' + (index + 1);
                frontImg.draggable = false;

                frontCard.appendChild(frontImg);
                frontContainer.appendChild(frontCard);
                front.appendChild(frontContainer);

                // BACK SIDE (left side when open) - Image only, same dimensions, centered
                const back = document.createElement('div');
                back.className = 'page-back';

                const backContainer = document.createElement('div');
                backContainer.className = 'card-container';

                const backCard = document.createElement('div');
                backCard.className = 'card';
                // Use previous image for back, or last image for first page
                const backImageIndex = index === 0 ? images.length - 1 : index - 1;
                backCard.onclick = () => openLightbox(backImageIndex);

                const backImg = document.createElement('img');
                backImg.className = 'card-image';
                backImg.src = images[backImageIndex];
                backImg.alt = 'Journal Image ' + (backImageIndex + 1);
                backImg.draggable = false;

                backCard.appendChild(backImg);
                backContainer.appendChild(backCard);
                back.appendChild(backContainer);

                page.appendChild(front);
                page.appendChild(back);
                container.appendChild(page);
            });
        }

        // IMAGE PRELOADER
        function preloadImages() {
            let loadedImages = 0;

            if(images.length === 0) {
                document.getElementById('loading').classList.add('hidden');
                return;
            }

            images.forEach((src) => {
                const img = new Image();
                img.onload = () => {
                    loadedImages++;
                    if (loadedImages === images.length) {
                        setTimeout(() => {
                            document.getElementById('loading').classList.add('hidden');
                        }, 500);
                    }
                };
                img.onerror = () => {
                    loadedImages++;
                    if (loadedImages === images.length) {
                        document.getElementById('loading').classList.add('hidden');
                    }
                };
                img.src = src;
            });
        }

        // ===== LIGHTBOX FUNCTIONS =====
        function openLightbox(index) {
            currentPage = index;
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightboxImg');
            const counter = document.getElementById('lightboxCounter');

            lightboxImg.src = images[index];
            counter.textContent = (index + 1) + ' / ' + totalPages;
            lightbox.classList.add('active');

            resetZoom();
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
            resetZoom();
        }

        function updateTransform() {
            const img = document.getElementById('lightboxImg');
            img.style.transform = 'translate(' + translateX + 'px, ' + translateY + 'px) scale(' + zoomLevel + ')';
        }

        function zoomIn() {
            zoomLevel = Math.min(zoomLevel + 0.5, 5);
            updateTransform();
        }

        function zoomOut() {
            zoomLevel = Math.max(zoomLevel - 0.5, 0.5);
            if (zoomLevel <= 1) {
                translateX = 0;
                translateY = 0;
            }
            updateTransform();
        }

        function resetZoom() {
            zoomLevel = 1;
            translateX = 0;
            translateY = 0;
            updateTransform();
        }

        // Desktop drag to pan
        const wrapper = document.getElementById('lightboxWrapper');
        const img = document.getElementById('lightboxImg');

        wrapper.addEventListener('mousedown', (e) => {
            if (zoomLevel <= 1) return;
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            initialTranslateX = translateX;
            initialTranslateY = translateY;
            img.classList.add('grabbing');
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            translateX = initialTranslateX + (e.clientX - startX);
            translateY = initialTranslateY + (e.clientY - startY);
            updateTransform();
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
            img.classList.remove('grabbing');
        });

        // Touch drag to pan
        wrapper.addEventListener('touchstart', (e) => {
            if (zoomLevel <= 1) return;
            isDragging = true;
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
            initialTranslateX = translateX;
            initialTranslateY = translateY;
            img.classList.add('grabbing');
        }, { passive: true });

        wrapper.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            translateX = initialTranslateX + (e.touches[0].clientX - startX);
            translateY = initialTranslateY + (e.touches[0].clientY - startY);
            updateTransform();
        }, { passive: true });

        wrapper.addEventListener('touchend', () => {
            isDragging = false;
            img.classList.remove('grabbing');
        });

        // Pinch to zoom
        let initialPinchDistance = 0;
        let initialZoom = 1;

        wrapper.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                initialPinchDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                initialZoom = zoomLevel;
            }
        }, { passive: true });

        wrapper.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2) {
                e.preventDefault();
                const distance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                zoomLevel = Math.min(Math.max(initialZoom * (distance / initialPinchDistance), 0.5), 5);
                updateTransform();
            }
        }, { passive: false });

        // Double tap to zoom
        let lastTap = 0;
        wrapper.addEventListener('touchend', (e) => {
            const currentTime = new Date().getTime();
            if (currentTime - lastTap < 300) {
                if (zoomLevel > 1) {
                    resetZoom();
                } else {
                    zoomLevel = 2.5;
                    updateTransform();
                }
            }
            lastTap = currentTime;
        });

        // Close on background click
        document.getElementById('lightbox').addEventListener('click', (e) => {
            if (e.target.id === 'lightbox' || e.target.id === 'lightboxWrapper') {
                closeLightbox();
            }
        });

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            const lightbox = document.getElementById('lightbox');
            if (!lightbox.classList.contains('active')) return;

            if (e.key === 'Escape') closeLightbox();
            if (e.key === '+' || e.key === '=') zoomIn();
            if (e.key === '-') zoomOut();
            if (e.key === '0') resetZoom();
            if (e.key === 'ArrowRight') {
                if (currentPage < totalPages - 1) {
                    openLightbox(currentPage + 1);
                }
            }
            if (e.key === 'ArrowLeft') {
                if (currentPage > 0) {
                    openLightbox(currentPage - 1);
                }
            }
        });

        // Scroll to zoom (desktop)
        wrapper.addEventListener('wheel', (e) => {
            e.preventDefault();
            if (e.deltaY < 0) {
                zoomIn();
            } else {
                zoomOut();
            }
        }, { passive: false });

        // ===== BOOK FUNCTIONS =====
        function openBook() {
            if (isAnimating) return;
            isAnimating = true;
            document.getElementById('book').classList.add('open');
            setTimeout(() => {
                currentPage = 0;
                updateNavButtons();
                isAnimating = false;
            }, 800);
        }

        function nextPage() {
            if (isAnimating || currentPage >= totalPages - 1) return;
            isAnimating = true;
            const pages = document.querySelectorAll('.page');
            const page = pages[currentPage];
            page.classList.add('flipping', 'flipped');

            setTimeout(() => {
                page.classList.remove('flipping');
                currentPage++;
                updateNavButtons();
                isAnimating = false;
            }, 900);
        }

        function prevPage() {
            if (isAnimating || currentPage <= 0) return;
            isAnimating = true;
            currentPage--;
            const pages = document.querySelectorAll('.page');
            const page = pages[currentPage];
            page.classList.add('flipping');
            page.classList.remove('flipped');

            setTimeout(() => {
                page.classList.remove('flipping');
                updateNavButtons();
                isAnimating = false;
            }, 900);
        }

        function updateNavButtons() {
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');

            if (currentPage === -1) {
                prevBtn.classList.add('hidden');
                nextBtn.classList.add('hidden');
            } else {
                prevBtn.classList.remove('hidden');
                nextBtn.classList.remove('hidden');
                if (currentPage === 0) prevBtn.classList.add('hidden');
                if (currentPage === totalPages - 1) nextBtn.classList.add('hidden');
            }
        }

        // Swipe Navigation for book
        let touchstartX = 0;
        let touchendX = 0;

        document.addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
        }, { passive: true });

        document.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            handleGesture();
        }, { passive: true });

        document.querySelector('.book-container').addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, { passive: false });

        function handleGesture() {
            const swipeDistance = touchstartX - touchendX;
            if (Math.abs(swipeDistance) > 40) { 
                if (swipeDistance > 0) {
                    currentPage === -1 ? openBook() : nextPage();
                } else {
                    prevPage();
                }
            }
        }

        window.addEventListener('load', () => {
            generateStars();
            createPages();
            preloadImages();
        });
    </script>
</body>
</html>
